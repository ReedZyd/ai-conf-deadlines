name: Update deadlines & deploy

on:
  schedule:
    - cron: "0 1 * * *"      # 每天 UTC 01:00（北京时间 09:00）自动运行
  workflow_dispatch:          # 也可在 Actions 页手动触发
  push:
    branches: [main]          # 推代码时也部署一次

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch latest deadlines
        run: python update.py    # 重新生成 data.js（仅用于本次部署，不提交回仓库）

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
