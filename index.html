<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 会议 Deadline 追踪</title>
  <link rel="stylesheet" href="style.css" />
  <script>if(localStorage.getItem("theme")==="light")document.documentElement.setAttribute("data-theme","light");</script>
</head>
<body>
  <header>
    <div class="top-actions">
      <a id="mapLink" class="lang-btn" href="map.html">🗺 地图</a>
      <button id="themeBtn" class="lang-btn" title="日间 / 夜间">🌙</button>
      <button id="langBtn" class="lang-btn" title="中 / English">EN</button>
    </div>
    <h1 id="pageTitle">AI 会议 Deadline 追踪</h1>
    <p class="sub" id="pageSub">所有时间已换算为你的本地时区 · 截稿默认 AoE (UTC−12)</p>
    <div class="controls">
      <input id="search" type="search" placeholder="搜索会议…" />
      <div id="tagbar" class="tagbar"></div>
      <label class="toggle">
        <input id="hidePast" type="checkbox" checked /> <span id="hidePastLabel">隐藏已截稿</span>
      </label>
      <label class="toggle">
        <input id="onlyStar" type="checkbox" /> <span id="onlyStarLabel">只看 ⭐ </span>
      </label>
    </div>
  </header>

  <main id="list"></main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
